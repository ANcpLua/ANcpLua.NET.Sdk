name: publish
on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NUGET_DIRECTORY: ${{ github.workspace}}/artifacts

defaults:
  run:
    shell: pwsh

jobs:
  lint_config:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      - name: Create artifacts directory
        run: mkdir -p artifacts
      - run: dotnet run --project=tools/ConfigFilesGenerator/ConfigFilesGenerator.csproj
      - name: Check for changes
        id: check_changes
        run: |
          git diff --exit-code
          if ($LASTEXITCODE -eq 0) {
            echo "has_changes=false" >> $env:GITHUB_OUTPUT
          } else {
            echo "has_changes=true" >> $env:GITHUB_OUTPUT
          }
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true' && github.repository == 'ANcpLua/ANcpLua.NET.Sdk'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update configuration files"
          git push

  compute_version:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.compute-version.outputs.package_version }}
    steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          with:
            fetch-depth: 0
            fetch-tags: true
        - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        - id: compute-version
          run: |
            $LatestTag = git describe --tags --abbrev=0 2>$null
            if ($LatestTag -and $LatestTag -match '^v([0-9]+)\.([0-9]+)\.([0-9]+)$')
            {
                $Major = [int]$Matches[1]
                $Minor = [int]$Matches[2]
                $Patch = [int]$Matches[3]

                # If HEAD is exactly the tag, reuse the version; otherwise bump patch
                $ExactTag = git tag --points-at HEAD | Where-Object { $_ -eq $LatestTag }
                if ($ExactTag) {
                    $NewVersion = "$Major.$Minor.$Patch"
                    Write-Host "HEAD is tagged $LatestTag — using version: $NewVersion"
                } else {
                    $Patch++
                    $NewVersion = "$Major.$Minor.$Patch"
                    Write-Host "Commits after $LatestTag — bumped to: $NewVersion"
                }
            }
            else
            {
                try
                {
                    $(Invoke-WebRequest "https://www.nuget.org/api/v2/package/ANcpLua.NET.Sdk/").BaseResponse.RequestMessage.RequestUri -match "ANcpLua\.net\.sdk\.(\d+)\.(\d+)\.(\d+)\.nupkg"
                    $Major = [int]$Matches.1
                    $Minor = [int]$Matches.2
                    $Patch = [int]$Matches.3 + 1
                    $NewVersion = "$Major.$Minor.$Patch"
                }
                catch
                {
                    $NewVersion = "1.1.3"
                }
            }

            Write-Host "New version: $NewVersion"
            "package_version=$NewVersion" >> $env:GITHUB_OUTPUT

  create_nuget:
    needs: [compute_version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      - name: Create artifacts directory
        run: New-Item -ItemType Directory -Force -Path artifacts
      - run: ./build.ps1 -Version ${{ needs.compute_version.outputs.package_version }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 3
          path: "${{ env.NUGET_DIRECTORY }}/*.nupkg"

  test:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.runs-on }}
    needs: [create_nuget, compute_version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nuget
          path: ${{ env.NUGET_DIRECTORY }}
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'
      - run: Get-ChildItem "${{ env.NUGET_DIRECTORY }}/*" -Recurse
      - run: dotnet --info
      - run: dotnet nuget locals all --clear
      # CheckEnforcement is for SDK consumers, not the SDK repo itself
      # (SDK repo uses Microsoft.NET.Sdk, can't dogfood ANcpLua.NET.Sdk)
      - run: dotnet test --project tests/ANcpLua.Sdk.Tests/ANcpLua.Sdk.Tests.csproj --report-xunit-trx --report-github --results-directory test_results
        env:
            CI: true
            NUGET_DIRECTORY: ${{ env.NUGET_DIRECTORY }}
            PACKAGE_VERSION: ${{ needs.compute_version.outputs.package_version }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test_results_${{ matrix.runs-on }}
          path: test_results

  deploy:
    runs-on: ubuntu-latest
    needs: [create_nuget, lint_config, test, compute_version]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nuget
          path: ${{ env.NUGET_DIRECTORY }}
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5

      - name: Must Publish Packages
        id: has_changes
        run: |
          # When HEAD is tagged (release commit), diff against the PREVIOUS tag
          # to detect changes. Without this, git diff $tag HEAD is always empty.
          $ExactTag = git describe --tags --exact-match HEAD 2>$null
          if ($ExactTag) {
            Write-Host "HEAD is tagged: $ExactTag — finding previous tag"
            $PreviousTag = git describe --tags --abbrev=0 "$ExactTag~1" 2>$null
          } else {
            $PreviousTag = git describe --tags --abbrev=0 2>$null
          }

          if ($PreviousTag) {
            Write-Host "Previous tag: $PreviousTag"
            # tests/**/* is included so test-only fixes (e.g. the CA1852 Sample class seal
            # for v3.3.1) still count as publishable changes — the earlier omission meant a
            # green CI silently skipped publish with no signal.
            $Changes = git diff --name-only $PreviousTag HEAD -- '*.nuspec' 'src/**/*' 'tests/**/*'
          } else {
            Write-Host "No previous tag found, checking all files"
            $Changes = $true
          }

          if ($Changes) {
            Write-Host "Changes: $Changes"
            echo "has_changes=true" >> $env:GITHUB_OUTPUT
            exit 0
          } else {
            Write-Host "No changes detected in .nuspec, src/, or tests/ files"
            echo "has_changes=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

      - name: Authenticate to NuGet (trusted publishing)
        if: steps.has_changes.outputs.has_changes == 'true'
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ANcpLua

      - name: Publish NuGet packages
        if: steps.has_changes.outputs.has_changes == 'true'
        run: |
          Write-Host "Publishing to NuGet.org"
          $files = Get-ChildItem "${{ env.NUGET_DIRECTORY }}/*" -Recurse -Include *.nupkg
          foreach ($file in $files) {
              Write-Host "Pushing: $($file.Name)"
              & dotnet nuget push "$($file.FullName)" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

      - name: Create GitHub release
        if: steps.has_changes.outputs.has_changes == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.compute_version.outputs.package_version }}
        run: |
          # Tag name matches the convention used by the human/CLI (v3.3.1, not 3.3.1).
          # Older runs used the bare "$VERSION" which created a second tag alongside the
          # pre-existing vX.Y.Z — see repo tags page for the historical duplicates.
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
