name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - 'CHANGELOG.md'
      - '**/*.lock'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    if: |
      github.actor != 'coderabbitai[bot]' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.pull_request.title, '[skip review]') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review')
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 100

      - name: Run Claude Code Review (agentic)
        id: claude-review
        uses: anthropics/claude-code-action@62238ddb33772a079b0a6d8665a1ff3043583067  # v1
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'dependabot[bot],renovate[bot]'
          track_progress: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          claude_args: '--model claude-opus-4-7 --max-turns 25'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Operating mode: **agentic**. You have write access to this PR branch.

            Decision tree:
            1. **Mechanically fixable** (formatting, naming, missing CancellationToken,
               IDisposable not disposed, .Result/.Wait blocking-async, DateTime.Now,
               null-forgiving `!`, suppression that can be rewritten, ISourceGenerator
               that should be IIncrementalGenerator, MSBuild property without condition
               guard) → fix in a commit pushed to this branch. Don't ask permission.
            2. **Structural concern needing human judgment** (architectural trade-off,
               novel pattern, transitive-dependency conflict, breaking SDK contract,
               analyzer-injection mechanism change, ghost-tag scenario) → flag in a
               comment and stop.
            3. **Clean** → post a single approval-style comment and stop.

            Read AGENTS.md / CLAUDE.md / .coderabbit.yaml for repo invariants.
            The .coderabbit.yaml ARCHITECTURAL INVARIANTS sections are authoritative.
